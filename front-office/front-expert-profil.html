<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Expert | Mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: #f1f5f9; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: white; box-shadow: var(--shadow-md); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: var(--transition); }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-light); display: flex; align-items: center; }
        .sidebar-menu { padding: 1rem 0; flex: 1; overflow-y: auto; }
        .menu-item { padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; color: var(--gray); font-weight: 500; cursor: pointer; transition: var(--transition); border-left: 3px solid transparent; text-decoration: none;}
        .menu-item:hover, .menu-item.active { background: rgba(14, 165, 233, 0.05); color: var(--secondary); }
        .menu-item.active { border-left-color: var(--secondary); }
        .menu-item i { width: 20px; text-align: center; font-size: 1.1rem; }
        .user-profile-widget { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-light); display: flex; align-items: center; gap: 1rem; background: white; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--secondary); color: white; display: flex; justify-content: center; align-items: center; font-weight: 600; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1rem 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
        .card { background: white; border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--dark); }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--gray-light); border-radius: var(--radius); font-family: var(--font-main); font-size: 1rem; transition: var(--transition); outline: none; }
        .form-control:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
        .tag { display: inline-block; padding: 0.3rem 0.8rem; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 500; background: rgba(14,165,233,0.1); color: var(--secondary); margin-right: 0.5rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><a href="../index.html" class="logo" style="text-decoration: none;"><i class="fa-solid fa-chart-pie text-secondary"></i> Digit Advisory</a></div>
            <div class="sidebar-menu">
                <a href="front-expert-dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Vue d'ensemble</a>
                <a href="front-expert-profil.html" class="menu-item active"><i class="fa-solid fa-user"></i> Mon Profil Expert</a>
                <a href="front-expert-portfolio.html" class="menu-item"><i class="fa-solid fa-folder-open"></i> Portfolio & CV</a>
                <a href="front-expert-offres.html" class="menu-item"><i class="fa-solid fa-briefcase"></i> Explorer les Offres</a>
                <a href="front-expert-candidatures.html" class="menu-item"><i class="fa-solid fa-file-contract"></i> Mes Candidatures</a>
                <a href="front-expert-messagerie.html" class="menu-item"><i class="fa-solid fa-comments"></i> Messagerie</a>
            </div>
            <div class="user-profile-widget">
                <div class="user-avatar">AL</div>
                <div><h4 style="font-size: 0.95rem; margin-bottom: 0.2rem;">Alice Martin</h4><span style="font-size: 0.8rem; color: var(--gray);">Consultant Senior</span></div>
                <a href="../login.html" style="margin-left: auto; color: var(--danger);"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-navbar">
                <h2 style="margin: 0; font-size: 1.5rem;">Mon Profil Expert</h2>
                <button class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Sauvegarder</button>
            </div>

            <section class="fade-in-up">
                <div class="card hover-zoom">
                    <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-id-card text-secondary"></i> Informations Personnelles</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" class="form-control" value="Alice Martin">
                        </div>
                        <div class="form-group">
                            <label>Email professionnel</label>
                            <input type="email" class="form-control" value="alice.martin@expert.fr">
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" class="form-control" value="+33 6 12 34 56 78">
                        </div>
                        <div class="form-group">
                            <label>Localisation</label>
                            <input type="text" class="form-control" value="Paris, France">
                        </div>
                    </div>
                </div>

                <div class="card hover-zoom">
                    <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-star text-secondary"></i> Domaines d'Expertise</h3>
                    <div style="margin-bottom: 1rem;">
                        <span class="tag">Cybersécurité</span>
                        <span class="tag">ISO 27001</span>
                        <span class="tag">RGPD</span>
                        <span class="tag">Audit Cloud</span>
                        <span class="tag">Management Qualité</span>
                    </div>
                    <div class="form-group">
                        <label>Ajouter un domaine</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" class="form-control" placeholder="Ex: Gestion de Projet...">
                            <button class="btn btn-outline"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>

                <div class="card hover-zoom">
                    <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-file-lines text-secondary"></i> Bio & Expérience</h3>
                    <div class="form-group">
                        <label>Résumé professionnel</label>
                        <textarea class="form-control" rows="4" style="resize: vertical;">Consultante Senior avec 8 ans d'expérience en cybersécurité et mise en conformité ISO. Spécialisée dans l'accompagnement des PME vers la certification ISO 27001 et la conformité RGPD.</textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label>Années d'expérience</label>
                            <input type="number" class="form-control" value="8">
                        </div>
                        <div class="form-group">
                            <label>TJM souhaité (€)</label>
                            <input type="number" class="form-control" value="650">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-primary pulse-glow"><i class="fa-solid fa-floppy-disk"></i> Sauvegarder les modifications</button>
                    <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger);"><i class="fa-solid fa-trash"></i> Désactiver mon compte</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
